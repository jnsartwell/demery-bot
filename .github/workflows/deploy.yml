name: Deploy to Fly.io

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create Fly.io app if needed
        run: flyctl apps create demery-bot --machines 2>/dev/null || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_AUTH_TOKEN }}

      - name: Set Fly.io secrets
        run: |
          flyctl secrets set \
            DISCORD_BOT_TOKEN="${{ secrets.DISCORD_BOT_TOKEN }}" \
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            DISCORD_BOT_APPLICATION_ID="${{ vars.DISCORD_BOT_APPLICATION_ID }}" \
            DISCORD_GUILD_ID="${{ vars.DISCORD_GUILD_ID }}" \
            DISCORD_BYPASS_USER_IDS="${{ vars.DISCORD_BYPASS_USER_IDS }}" \
            TAUNT_HOUR="${{ vars.TAUNT_HOUR }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_AUTH_TOKEN }}

      - name: Deploy
        run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_AUTH_TOKEN }}
